{% extends "base.html" %}
{% block title %} Homepage {% endblock %}

{% block content %}

    <form action="/poke-info" method="POST">

        <div class="row">
            <div class="col"><h6>Welcome to the Pokemon Infographic maker! Type in a Pokemon name to start.</h6></div>
        </div>

        <div class="row justify-content-center">
            <div class="col-auto">
                <label for="name">Pokemon name: </label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="col-auto">
                <input type="submit" value="Go">
            </div>
            <br><br><br><br>
        </div>
    </form>
</div>

{% endblock %}
