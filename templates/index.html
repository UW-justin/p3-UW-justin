{% extends "base.html" %}
{% block title %} Pokemon Search {% endblock %}

{% block content %}

<form action="/poke-info" method="POST">
    <div class="container-fluid">
        <div class="row text-center">
            <div class="col">
                <h1>Welcome to the Pokemon Infographic maker! Type in a Pokemon name to get started.</h1>
            </div>
        </div>
    </div>
        
    <br>

    <div class="container text-center">

        <div class="row align-items-start">
            <div class="col-2">
                <img src="{{ url_for('static', filename='images/spheal.gif') }}" alt="Spheal spinning" width="200" height="200" style="border:4px solid rgb(255, 255, 255)">
            </div>

            <div class="col-8">
                <label for="name"><h3>Pokemon Name: </h3></label>
                <input type="text" id="name" name="name" required>
                <input type="submit" class="btn btn-primary" value="Go">

                <br>

                <h2 style="margin-left: 120px;">Try searching: "Goomy" or "Spheal"</h2>
            </div>
            <div class="col-2">
                <img src="{{ url_for('static', filename='images/seal_spin.gif') }}" alt="Seal spinning" width="200" height="200" style="border:4px solid black">
            </div>
        </div>
        
        <br><br><br>

    </div>
</form>


{% endblock %}
