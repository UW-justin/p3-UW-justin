{% extends "base.html" %}
{% block title %} Homepage {endblock}

{% block content %}

<div class="container">
    <form action="/poke-info" method="POST">

        <div class="row">
            <div class="col">Welcome to the Pokemon Infographic maker! Type in a Pokemon name to start.</div>
        </div>

        <div class="row">
            <label for="name">Pokemon name: </label>
            <input type="text" id="name" name="name" required>
        </div>
         <input type="submit" value="Go">

    </form>
</div>

{% endblock %}
