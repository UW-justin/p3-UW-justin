<!DOCTYPE html>
<html>
    <head>
        <title>
            {% block title %} Poke Infographic {% endblock %}
        </title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
        
        <!-- Importing a google font: Outfit -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
        
        <!-- Just for viewing on chrome, remove later -->
        <link rel="stylesheet" href="../static/style.css">
        
    </head>
    <body>
        <div class="container">
            <div class="row">
                <div class="col"><img src="{{ url_for('static', filename='images/Poke_Ball.html')}}" alt="impostor"></div>
                <div class="col">
                    <header>Pokemon Infographic</header>
                    {% block content %} {% endblock %}
                    <footer>Final Project Created by Justin Nguyen HCDE 310</footer>
                </div>
            </div>
        </div>
    </body>
</html>
