<!DOCTYPE html>
<html>
    <head>
        <title>
            {% block title %} Poke Infographic {% endblock %}
        </title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
        
        <!-- Importing a google font: Outfit -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    </head>
    <body>
        <div class="container text-center">
            <div class="row align-items-center">
                <div class="col-auto">
                    <img src="{{ url_for('static', filename='images/Poke_Ball.webp') }}" alt="Pokeball Motif" width="50" height="50">
                </div>
                
                <div class="col-auto">
                    <header>Pokemon Infographic</header>
                </div>

                <div class="col-auto">
                    <img src="{{ url_for('static', filename='images/Poke_Ball.webp') }}" alt="Pokeball Motif" width="50" height="50">
                </div>
            </div>
                
            {% block content %} {% endblock %}

            <div class="row">
                <div class="col">
                    <footer>Final Project Created by Justin Nguyen HCDE 310</footer>
                </div>
            </div>
        </div>
    </body>
</html>
